{% extends 'base.html' %}

{% block title %}Cennik Centralny{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h2 class="fw-bold" style="color: var(--dark-color);"><i class="bi bi-tags-fill me-2 text-primary"></i>Katalog
            Usług</h2>
    </div>
</div>

<div class="row">
    <div class="col-md-5 mb-4">
        <div class="card shadow-sm border-0 sticky-top" style="top: 100px;">
            <div class="card-body p-4 bg-primary text-white rounded">
                <h5 class="fw-bold mb-4 text-white"><i class="bi bi-tag-fill me-2"></i>Dodaj nową usługę</h5>
                <form action="{{ url_for('boss.catalog') }}" method="POST">
                    <input type="hidden" name="action" value="add">
                    <div class="mb-3">
                        <label class="form-label text-white-50 small">Nazwa Usługi</label>
                        <input type="text" class="form-control" name="name" placeholder="np. Wymiana tarcz"
                            required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white-50 small">Koszt brutto</label>
                        <input type="number" step="0.01" class="form-control" name="price" placeholder="450.00"
                            required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-white-50 small">Szczegóły</label>
                        <textarea class="form-control" name="description" rows="2" placeholder="Szczegóły"></textarea>
                    </div>
                    <button type="submit" class="btn btn-light w-100 py-2 fw-bold text-primary">Zapisz</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-7 mb-4">
        <div class="row">
            {% for item in catalog %}
            <div class="col-12 mb-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body d-flex justify-content-between align-items-center p-4">
                        <div>
                            <h5 class="fw-bold mb-1" style="color: var(--dark-color);">{{ item.name }}</h5>
                            <p class="text-muted mb-0 small">{{ item.description }}</p>
                        </div>
                        <div class="text-end ms-3">
                            <h4 class="fw-bold text-success mb-2">{{ item.price }} zł</h4>
                            <form action="{{ url_for('boss.catalog') }}" method="POST"
                                onsubmit="return confirm('Wycofać ze sprzedaży?');">
                                <input type="hidden" name="action" value="delete">
                                <input type="hidden" name="service_id" value="{{ item.id }}">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Usuń</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="col text-center py-5">
                <p class="text-muted"><i class="bi bi-wallet2" style="font-size: 2rem;"></i><br>Brak zdefiniowanych
                    usług</p>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
