{% extends 'base.html' %}
{% block title %}Logowanie{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <h3 class="fw-bold mb-4 text-center">Logowanie</h3>
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label class="form-label text-muted small">Login</label>
                        <input type="text" class="form-control" name="username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small">Hasło</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Zaloguj się</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
